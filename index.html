<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>لوحة متابعة تجهيز الفرع — قوين</title>
<style>
:root{
  --accent:#0f766e; --accent-dark:#115e59; --accent-soft:#ccfbf1;
  --done:#16a34a; --done-bg:#dcfce7;
  --prog:#d97706; --prog-bg:#fef3c7;
  --follow:#ea580c; --follow-bg:#ffedd5;
  --none:#dc2626; --none-bg:#fee2e2;
  --over:#7c3aed; --over-bg:#ede9fe;
  --muted:#64748b; --muted-bg:#f1f5f9;
  --ink:#0f172a; --ink-2:#334155;
  --line:#e2e8f0; --bg:#f4f6f8; --card:#ffffff;
  --radius:12px;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.05);
  --shadow-lg:0 4px 16px rgba(15,23,42,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Segoe UI",Tahoma,"Noto Kufi Arabic","Geeza Pro",sans-serif;
  background:var(--bg);color:var(--ink);font-size:15px;line-height:1.55;
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}

/* ---------- Header ---------- */
.app-header{
  position:sticky;top:0;z-index:50;background:var(--accent);color:#fff;
  box-shadow:var(--shadow-lg);
}
.app-header .inner{
  max-width:1280px;margin:0 auto;padding:10px 16px;
  display:flex;flex-wrap:wrap;align-items:center;gap:8px 16px;
}
.app-title{font-size:17px;font-weight:700;letter-spacing:.2px}
.app-title small{display:block;font-size:11.5px;font-weight:400;opacity:.85}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-inline-start:auto;align-items:center}
.tb-btn{
  min-height:38px;padding:6px 14px;border:1px solid rgba(255,255,255,.35);
  background:rgba(255,255,255,.12);color:#fff;border-radius:8px;font-size:13px;
  font-weight:600;transition:background .15s;
}
.tb-btn:hover{background:rgba(255,255,255,.24)}
.tb-btn.danger{border-color:rgba(255,205,205,.6);background:rgba(190,30,30,.35)}
.tb-btn.danger:hover{background:rgba(190,30,30,.55)}
.saved-at{font-size:11.5px;opacity:.85;white-space:nowrap}

/* ---------- Tabs ---------- */
.tabbar-wrap{
  position:sticky;top:var(--hdr-h,58px);z-index:40;background:var(--card);
  border-bottom:1px solid var(--line);box-shadow:var(--shadow);
}
.tabbar{
  max-width:1280px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;
  padding:8px 12px;scrollbar-width:thin;-webkit-overflow-scrolling:touch;
}
.tab{
  flex:0 0 auto;min-height:44px;padding:8px 14px;border:1px solid var(--line);
  background:var(--card);color:var(--ink-2);border-radius:999px;font-size:13.5px;
  font-weight:600;white-space:nowrap;transition:all .15s;
}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .cnt{font-size:11px;opacity:.75;margin-inline-start:4px}
/* emoji icons: one consistent size/baseline everywhere they appear */
.tab-ic{display:inline-block;font-size:14px;line-height:1;margin-inline-start:5px;vertical-align:-1px}
.tab-divider{flex:0 0 1px;align-self:stretch;background:var(--line);margin-block:4px;margin-inline:6px}

/* ---------- Filters ---------- */
.filters{
  max-width:1280px;margin:0 auto;padding:12px 16px 0;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
}
.search-box{position:relative;flex:1 1 240px;max-width:420px}
.search-box input{
  width:100%;min-height:44px;padding:8px 12px;padding-inline-end:38px;border:1px solid var(--line);
  border-radius:10px;background:var(--card);font-size:14px;
}
.search-box input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
.search-box .ic{position:absolute;inset-inline-start:auto;inset-inline-end:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{
  min-height:36px;padding:5px 13px;border-radius:999px;border:1px solid var(--line);
  background:var(--card);font-size:12.5px;font-weight:600;color:var(--ink-2);transition:all .12s;
}
.chip:hover{border-color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip.c-over.active{background:var(--over);border-color:var(--over)}
/* named screens (suppliers/orders/tracking/reports/settings) carry their own
   search inputs inside #main — the global search/filter bar is hidden there */
body.no-filters .filters{display:none}

/* ---------- Layout ---------- */
main{max-width:1280px;margin:0 auto;padding:16px 16px 64px}
.section-title{font-size:15px;font-weight:700;color:var(--ink-2);margin:22px 0 10px}
.empty-note{
  background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
  padding:28px;text-align:center;color:var(--muted);font-size:14px;
}

/* ---------- KPI cards ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:12px}
.kpi{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;border-top:3px solid var(--accent);
}
.kpi .lbl{font-size:12px;color:var(--muted);font-weight:600}
.kpi .val{font-size:22px;font-weight:800;margin-top:2px;direction:ltr;text-align:right}
.kpi .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.kpi.k-def{border-top-color:var(--none)}   .kpi.k-def .val{color:var(--none)}
.kpi.k-reg{border-top-color:var(--done)}   .kpi.k-reg .val{color:var(--done)}
.kpi.k-over{border-top-color:var(--over)}  .kpi.k-over .val{color:var(--over)}
.kpi.k-money{border-top-color:var(--prog)}

/* ---------- Progress bars ---------- */
.bar{position:relative;height:8px;background:var(--muted-bg);border-radius:999px;overflow:hidden;min-width:70px}
.bar .fill{position:absolute;top:0;inset-inline-start:0;height:100%;background:var(--accent);border-radius:999px;transition:width .25s}
.bar .fill.f-done{background:var(--done)}
.bar .fill.f-prog{background:var(--prog)}
.bar .fill.f-follow{background:var(--follow)}
.bar .fill.f-none{background:var(--none)}
.bar .overflow{position:absolute;top:0;inset-inline-end:0;height:100%;background:repeating-linear-gradient(45deg,var(--over),var(--over) 4px,#a78bfa 4px,#a78bfa 8px);border-radius:999px}
.bar-line{display:flex;align-items:center;gap:8px}
.bar-line .pct-txt{font-size:12px;font-weight:700;color:var(--ink-2);min-width:38px;direction:ltr;text-align:left}

/* ---------- Chips / badges ---------- */
.st{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;white-space:nowrap}
.st.s-done{background:var(--done-bg);color:#166534}
.st.s-prog{background:var(--prog-bg);color:#92400e}
.st.s-follow{background:var(--follow-bg);color:#9a3412}
.st.s-none{background:var(--none-bg);color:#991b1b}
.st.s-blank{background:var(--muted-bg);color:var(--muted)}
.badge-over{
  display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;
  background:var(--over-bg);color:#5b21b6;border:1px solid #ddd6fe;white-space:nowrap;
}

/* ---------- Overview: donut + categories ---------- */
.ov-grid{display:grid;grid-template-columns:1fr;gap:16px}
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.panel h3{font-size:14px;font-weight:700;color:var(--ink-2);margin-bottom:12px}
.donut-wrap{display:flex;flex-wrap:wrap;align-items:center;gap:20px;justify-content:center}
.donut-legend{display:flex;flex-direction:column;gap:6px;font-size:13px}
.donut-legend .li{display:flex;align-items:center;gap:8px}
.donut-legend .sw{width:12px;height:12px;border-radius:3px;flex:0 0 auto}
.donut-center{font-size:20px;font-weight:800;fill:var(--ink)}
.donut-center-sub{font-size:9px;fill:var(--muted)}

/* overview table (desktop) */
.ov-table-wrap{overflow-x:auto;border-radius:var(--radius)}
table.ov{width:100%;border-collapse:collapse;font-size:13.5px;min-width:760px}
table.ov th{
  background:var(--muted-bg);color:var(--ink-2);font-size:12px;font-weight:700;
  padding:10px 10px;text-align:start;white-space:nowrap;border-bottom:2px solid var(--line);
}
table.ov td{padding:10px;border-bottom:1px solid var(--line);vertical-align:middle}
table.ov tr:hover td{background:#f8fafc}
table.ov tr{cursor:pointer}
table.ov .cat-name{font-weight:700;color:var(--accent-dark)}
.num{direction:ltr;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}

/* overview cards (mobile) */
.ov-cards{display:none;flex-direction:column;gap:10px}
.ov-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;cursor:pointer;border:1px solid transparent;min-height:44px;
}
.ov-card:active{border-color:var(--accent)}
.ov-card .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ov-card .nm{font-weight:700;color:var(--accent-dark);font-size:14.5px;margin-inline-end:auto}
.ov-card .nums{display:flex;gap:14px;margin:8px 0 8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.ov-card .nums b{color:var(--ink);font-size:13px;direction:ltr;display:inline-block}

/* ---------- Category view ---------- */
.cat-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.back-btn{
  min-height:44px;min-width:44px;padding:8px 16px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);font-weight:700;font-size:13.5px;color:var(--accent-dark);box-shadow:var(--shadow);
}
.back-btn:hover{border-color:var(--accent)}
.cat-title{font-size:19px;font-weight:800;color:var(--ink)}
.cat-info{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px;
}
.field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:4px}
.field select,.field input{
  width:100%;min-height:44px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:14px;
}
.field select:focus,.field input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.cat-actions{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.act-btn{
  min-height:44px;padding:8px 16px;border-radius:10px;border:1px solid var(--accent);
  background:var(--accent-soft);color:var(--accent-dark);font-weight:700;font-size:13px;
}
.act-btn:hover{background:var(--accent);color:#fff}

/* category table (desktop) */
.cat-table-wrap{overflow-x:auto;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow)}
table.ct{border-collapse:separate;border-spacing:0;font-size:13px;min-width:100%}
table.ct th{
  background:var(--muted-bg);color:var(--ink-2);font-size:11.5px;font-weight:700;padding:9px 8px;
  text-align:center;white-space:nowrap;border-bottom:2px solid var(--line);position:sticky;top:0;
}
table.ct td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle;background:var(--card)}
table.ct tr:last-child td{border-bottom:none}
table.ct th.sticky,table.ct td.sticky{
  position:sticky;inset-inline-start:0;z-index:2;text-align:start;
  box-shadow:1px 0 0 var(--line) inset;
}
table.ct th.sticky{z-index:3;background:var(--muted-bg)}
table.ct td.sticky{background:var(--card);font-weight:600;min-width:150px;max-width:220px}
table.ct tfoot td{background:var(--muted-bg);font-weight:800;border-top:2px solid var(--line)}
table.ct tfoot td.sticky{background:var(--muted-bg)}
.cell-in{
  width:74px;min-height:38px;padding:5px 6px;border:1px solid var(--line);border-radius:7px;
  text-align:center;direction:ltr;background:#fff;font-size:13px;font-variant-numeric:tabular-nums;
}
.cell-in:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:var(--accent)}
.cell-in.txt{width:140px;text-align:start;direction:rtl}
.cell-in.code{width:60px}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield;appearance:textfield}

/* category cards (mobile) */
.cat-cards{display:none;flex-direction:column;gap:10px}
.sub-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.sub-card summary{
  list-style:none;display:block;padding:12px 14px;cursor:pointer;min-height:44px;
}
.sub-card summary::-webkit-details-marker{display:none}
.sub-card .sum-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sub-card .sum-nm{font-weight:700;font-size:14px;margin-inline-end:auto}
.sub-card .sum-nums{font-size:11.5px;color:var(--muted);margin:6px 0}
.sub-card .sum-nums b{color:var(--ink);direction:ltr;display:inline-block}
.sub-card .body{padding:4px 14px 14px;border-top:1px solid var(--line)}
.sup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.sup-cell label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sup-cell input{width:100%;min-height:44px;padding:8px;border:1px solid var(--line);border-radius:8px;text-align:center;direction:ltr;font-size:15px}
.sup-cell input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.sub-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.chev{transition:transform .2s;color:var(--muted);font-size:12px}
details[open] .chev{transform:rotate(180deg)}

/* ---------- Footer ---------- */
.app-footer{max-width:1280px;margin:0 auto;padding:0 16px 32px;color:var(--muted);font-size:12px;text-align:center}

/* ---------- Toast ---------- */
#toast{
  position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(50%);z-index:100;
  background:var(--ink);color:#fff;padding:10px 20px;border-radius:10px;font-size:13.5px;
  box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .25s;
}
#toast.show{opacity:1}

/* ---------- Modal framework ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:90;background:rgba(15,23,42,.45);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay[hidden]{display:none}
.modal-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-lg);
  width:100%;max-width:560px;max-height:calc(100vh - 32px);overflow-y:auto;
  padding:18px 20px;
}
.modal-card.wide{max-width:880px}
.modal-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-title{font-size:16px;font-weight:800;margin-inline-end:auto}
.modal-close{
  min-width:44px;min-height:44px;border:1px solid var(--line);background:var(--muted-bg);
  color:var(--ink-2);border-radius:10px;font-size:15px;line-height:1;flex:0 0 auto;
}
.modal-close:hover{border-color:var(--none);color:var(--none)}
.modal-foot{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
body.modal-open{overflow:hidden}

/* ---------- Suppliers screen (stage 3) ---------- */
.sup-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.sup-head .sup-count{color:var(--muted);font-size:13px;font-weight:600}
.sup-head .act-btn{margin-inline-start:auto}
.sup-tools{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.sup-tools .search-box{flex:1 1 220px;max-width:360px}
.f-sel{min-height:44px;padding:8px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:13.5px;color:var(--ink-2)}
.f-sel:focus{outline:2px solid var(--accent);outline-offset:-1px}
.mini-btn{min-height:44px;padding:8px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card);font-weight:600;font-size:12.5px;color:var(--ink-2)}
.mini-btn:hover{border-color:var(--accent);color:var(--accent)}
.suppliers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.supplier-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:10px;border-top:3px solid var(--accent);
}
.supplier-card.inactive{border-top-color:var(--muted);opacity:.85}
.sup-top{display:flex;align-items:center;gap:10px}
.sup-avatar{
  width:40px;height:40px;flex:0 0 auto;border-radius:50%;background:var(--accent-soft);
  color:var(--accent-dark);font-weight:800;font-size:17px;
  display:flex;align-items:center;justify-content:center;
}
.sup-id{min-width:0;margin-inline-end:auto}
.sup-nm{font-weight:800;font-size:14.5px;color:var(--ink);overflow-wrap:anywhere}
.sup-contact{font-size:12px;color:var(--muted)}
.sup-lines{display:flex;flex-direction:column;gap:4px;font-size:12.5px;color:var(--ink-2)}
.sup-line{overflow-wrap:anywhere}
.sup-stats{display:flex;gap:10px}
.sup-stat{flex:1;background:var(--muted-bg);border-radius:10px;padding:8px;text-align:center}
.sup-stat b{display:block;font-size:16px;direction:ltr}
.sup-stat span{font-size:11px;color:var(--muted);font-weight:600}
.sup-cats-chips{display:flex;flex-wrap:wrap;gap:6px}
.cat-chip{background:var(--accent-soft);color:var(--accent-dark);border-radius:999px;padding:3px 10px;font-size:11px;font-weight:700}
.cat-chip.more{background:var(--muted-bg);color:var(--muted)}
.sup-nocats{font-size:12px;color:var(--muted)}
.sup-notes{
  font-size:12px;color:var(--muted);background:var(--muted-bg);border-radius:8px;
  padding:8px 10px;white-space:pre-wrap;overflow-wrap:anywhere;
}
.sup-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.s-btn{
  min-height:44px;min-width:44px;padding:8px 12px;border-radius:10px;border:1px solid var(--line);
  background:var(--card);font-size:12.5px;font-weight:700;color:var(--ink-2);
}
.s-btn:hover{border-color:var(--accent);color:var(--accent)}
.s-btn.primary{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-dark)}
.s-btn.primary:hover{background:var(--accent);color:#fff}
.s-btn.danger:hover{border-color:var(--none);color:var(--none)}
.s-btn.ic-btn{font-size:15px;line-height:1}
/* modal forms (suppliers + later stages) */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .field.full{grid-column:1/-1}
.field input.ltr{direction:ltr;text-align:start}
.field textarea{
  width:100%;min-height:72px;padding:8px 10px;border:1px solid var(--line);
  border-radius:8px;background:#fff;font-size:14px;resize:vertical;
}
.field textarea:focus{outline:2px solid var(--accent);outline-offset:-1px}
/* category-assignment modal */
.cat-modal-tools{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.cat-modal-tools input[type=search]{
  flex:1 1 160px;min-height:44px;padding:8px 10px;border:1px solid var(--line);
  border-radius:10px;font-size:14px;background:var(--card);
}
.cat-modal-tools input[type=search]:focus{outline:2px solid var(--accent);outline-offset:-1px}
.cat-check-list{display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:46vh;overflow-y:auto;padding:2px}
.cat-check{
  display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:10px;
  padding:8px 10px;cursor:pointer;font-size:12.5px;font-weight:600;min-height:44px;
}
.cat-check:hover{border-color:var(--accent)}
.cat-check.checked{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-dark)}
.cat-check input{width:16px;height:16px;accent-color:var(--accent);flex:0 0 auto}
.cat-check .cc-name{margin-inline-end:auto;overflow-wrap:anywhere}
.cat-check .cc-cnt{font-size:11px;color:var(--muted)}

/* ---------- Order wizard (stage 4) ---------- */
.wiz-steps{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.wiz-step{
  flex:1 1 110px;display:flex;align-items:center;gap:6px;padding:8px 10px;
  border:1px solid var(--line);border-radius:10px;font-size:12px;font-weight:700;
  color:var(--muted);background:var(--muted-bg);
}
.wiz-step .n{
  width:22px;height:22px;border-radius:50%;background:var(--line);color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;font-size:11px;flex:0 0 auto;
}
.wiz-step.active{border-color:var(--accent);background:var(--accent-soft);color:var(--accent-dark)}
.wiz-step.active .n{background:var(--accent);color:#fff}
.wiz-step.done{color:var(--accent-dark)}
.wiz-step.done .n{background:var(--done);color:#fff}
.wiz-hint{font-size:12.5px;color:var(--muted);margin-bottom:10px}
/* step 1: supplier autocomplete */
.wiz-ac{position:relative}
.wiz-ac-list{
  position:absolute;inset-inline:0;top:calc(100% + 4px);z-index:5;background:var(--card);
  border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow-lg);
  max-height:240px;overflow-y:auto;
}
.wiz-ac-item{
  display:block;width:100%;text-align:start;padding:10px 12px;min-height:44px;
  border:none;background:none;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px;
}
.wiz-ac-item:last-child{border-bottom:none}
.wiz-ac-item:hover{background:var(--accent-soft)}
.wiz-ac-item .nm{display:block;font-weight:700}
.wiz-ac-item .sub{display:block;font-size:11.5px;color:var(--muted)}
.wiz-ac-empty{padding:12px;text-align:center;color:var(--muted);font-size:12.5px}
.wiz-sup-box{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;
  background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:10px 12px;
}
.wiz-sup-box b{font-size:14px;color:var(--accent-dark);overflow-wrap:anywhere}
.wiz-sup-box .sub{flex-basis:100%;font-size:12px;color:var(--muted)}
/* step 3: allocation groups */
.alloc-group{border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:14px}
.alloc-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.alloc-title{font-weight:800;font-size:14px;color:var(--accent-dark);margin-inline-end:auto;overflow-wrap:anywhere}
.alloc-tgt{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted)}
.alloc-tgt input{
  width:96px;min-height:44px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;
  text-align:center;direction:ltr;font-size:15px;font-variant-numeric:tabular-nums;
}
.alloc-tgt input:focus{outline:2px solid var(--accent);outline-offset:-1px}
.alloc-table-wrap{overflow:auto;max-height:320px;border:1px solid var(--line);border-radius:10px}
table.at{border-collapse:separate;border-spacing:0;width:100%;font-size:12.5px}
table.at th{
  position:sticky;top:0;z-index:1;background:var(--muted-bg);color:var(--ink-2);
  font-size:11.5px;font-weight:700;padding:8px;text-align:center;white-space:nowrap;
  border-bottom:2px solid var(--line);
}
table.at td{padding:5px 8px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
table.at tr:last-child td{border-bottom:none}
table.at td.an{text-align:start;font-weight:600;min-width:140px;overflow-wrap:anywhere}
.alloc-cards{display:none;flex-direction:column;gap:8px;margin-top:2px}
.alloc-cards .wiz-sumq{direction:ltr;font-size:13px;color:var(--accent-dark)}
.alloc-sum{
  display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-top:10px;font-size:12px;
  color:var(--muted);background:var(--muted-bg);border-radius:10px;padding:8px 10px;
}
.alloc-sum b{color:var(--ink);direction:ltr;display:inline-block}
.alloc-sum .bar-line{flex:1 1 140px}
/* step 4: review */
.wiz-review-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table.wr{border-collapse:collapse;width:100%;font-size:12.5px}
table.wr th{
  background:var(--muted-bg);color:var(--ink-2);font-size:11.5px;font-weight:700;
  padding:8px;text-align:start;white-space:nowrap;border-bottom:2px solid var(--line);
}
table.wr td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:middle;text-align:start}
table.wr tfoot td{background:var(--muted-bg);font-weight:800;border-top:2px solid var(--line);border-bottom:none}
table.wr td .bar-line{min-width:110px}

/* ---------- Orders screen (stage 5) ---------- */
.orders-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.order-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px;display:flex;flex-direction:column;gap:10px;cursor:pointer;
  border:1px solid transparent;border-top:3px solid var(--accent);
}
.order-card:hover,.order-card:focus-visible{border-color:var(--accent)}
.order-card.o-delivered{border-top-color:var(--done)}
.order-card.o-cancelled{border-top-color:var(--none);opacity:.85}
.ord-top{display:flex;align-items:flex-start;gap:10px}
.ord-id{min-width:0;margin-inline-end:auto}
.ord-sup{font-weight:800;font-size:14.5px;color:var(--ink);overflow-wrap:anywhere}
.ord-num{font-size:11px;color:var(--muted);direction:ltr;unicode-bidi:embed;overflow-wrap:anywhere;font-variant-numeric:tabular-nums}
.ord-side{text-align:start;flex:0 0 auto}
.ord-date{font-size:11.5px;color:var(--muted);margin-top:4px}
.ord-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px;font-size:12px;color:var(--muted)}
.ord-meta b{color:var(--ink);direction:ltr;display:inline-block}
.ord-meta .neg b{color:var(--none)}
.ord-posted{
  font-size:11.5px;font-weight:700;color:var(--accent-dark);background:var(--accent-soft);
  border-radius:8px;padding:4px 10px;align-self:flex-start;
}
/* order details modal */
.ord-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ord-cell{background:var(--muted-bg);border-radius:10px;padding:10px 12px}
.ord-cell .lbl{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:3px}
.ord-cell .val{font-weight:800;font-size:13.5px;overflow-wrap:anywhere}
.ord-cell select{
  width:100%;min-height:44px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;
  background:var(--card);font-size:14px;font-weight:700;
}
.ord-cell select:focus{outline:2px solid var(--accent);outline-offset:-1px}
.ord-subs{margin-top:8px;font-size:12px;color:var(--muted)}
.ord-subs-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.ord-subs-chips .cat-chip b{direction:ltr;display:inline-block}
.modal-foot .danger-btn{border-color:var(--none);color:var(--none)}
.modal-foot button[disabled]{opacity:.5;cursor:not-allowed}

/* ---------- Tracking + Reports + overview orders panel (stage 6) ---------- */
.trk-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:16px;margin-bottom:14px;border-top:3px solid var(--accent);
}
.trk-head{display:flex;align-items:center;gap:8px 10px;flex-wrap:wrap;margin-bottom:10px}
.trk-name{font-weight:800;font-size:14.5px;color:var(--ink);margin-inline-end:auto;overflow-wrap:anywhere}
.trk-count{font-size:12px;color:var(--muted);font-weight:600}
.trk-hint{font-size:12px;color:var(--muted)}
.trk-card .alloc-sum{margin-top:0;margin-bottom:10px}
.rep-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.rep-tab{
  min-height:44px;padding:8px 18px;border:1px solid var(--line);border-radius:999px;
  background:var(--card);color:var(--ink-2);font-size:13px;font-weight:700;transition:all .15s;
}
.rep-tab:hover{border-color:var(--accent);color:var(--accent)}
.rep-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.rep-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.rep-head h3{margin-bottom:0;margin-inline-end:auto;font-size:14.5px}
.rep-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:10px}
table.rep{border-collapse:collapse;width:100%;font-size:12.5px}
table.rep th{
  background:var(--muted-bg);color:var(--ink-2);font-size:11.5px;font-weight:700;
  padding:8px;text-align:start;white-space:nowrap;border-bottom:2px solid var(--line);
}
table.rep td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:middle;text-align:start}
table.rep tr:last-child td{border-bottom:none}
table.rep tfoot td{background:var(--muted-bg);font-weight:800;border-top:2px solid var(--line);border-bottom:none}
table.rep td .bar-line{min-width:110px}
tr.rep-cat-row td{background:var(--accent-soft);color:var(--accent-dark);font-weight:800}
.rep-neg{color:var(--none);font-weight:700}
/* overview: top suppliers as pure CSS horizontal bars (RTL-native) */
.topsup{display:flex;flex-direction:column;gap:10px}
.ts-row{display:flex;align-items:center;gap:10px;font-size:12.5px;min-height:24px}
.ts-name{flex:0 1 140px;min-width:70px;overflow-wrap:anywhere;font-weight:600;color:var(--ink-2)}
.ts-row .bar{flex:1 1 auto}
.ts-val{direction:ltr;font-variant-numeric:tabular-nums;min-width:44px;text-align:left;color:var(--ink)}
/* settings screen: action tiles + system-info counters */
.set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}
.set-btn{
  min-height:64px;padding:12px 14px;border:1px solid var(--line);border-radius:12px;
  background:var(--card);text-align:start;transition:all .15s;
}
.set-btn:hover{border-color:var(--accent);background:var(--accent-soft)}
.set-btn .t{display:block;font-weight:800;font-size:13.5px;color:var(--ink)}
.set-btn .d{display:block;font-size:11.5px;color:var(--muted);margin-top:3px}
.set-btn.danger{border-color:var(--none)}
.set-btn.danger .t{color:var(--none)}
.set-btn.danger:hover{background:var(--none);border-color:var(--none)}
.set-btn.danger:hover .t,.set-btn.danger:hover .d{color:#fff}
.sys-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.sys-info .si{background:var(--muted-bg);border-radius:10px;padding:10px 12px}
.sys-info .si .lbl{font-size:11.5px;color:var(--muted);font-weight:700}
.sys-info .si .val{font-size:15px;font-weight:800;margin-top:3px;overflow-wrap:anywhere}

/* ---------- Responsive ---------- */
@media (max-width:768px){
  .app-title{font-size:15px}
  .ov-table-wrap{display:none}
  .ov-cards{display:flex}
  .cat-table-wrap{display:none}
  .cat-cards{display:flex}
  .kpis{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .kpi .val{font-size:19px}
  .tb-btn{min-height:44px}
  .chip{min-height:44px;padding:8px 14px}
  .sup-cell label,.sub-card .sum-nums,.st,.badge-over,.chip,.kpi .lbl,.kpi .sub,.ov-card .nums,.ov-card .nums b,.bar-line .pct-txt{font-size:14px}
  .bar-line .pct-txt{min-width:44px}
  /* iOS zoom guard: force ≥16px on every input on mobile. !important beats every
     class-scoped component rule (e.g. .cat-modal-tools input[type=search] at (0,2,1))
     regardless of specificity or source order — a bare selector alone cannot. */
  input,select,textarea{font-size:16px!important}
  /* suppliers screen: single column on mobile */
  .suppliers-grid{grid-template-columns:1fr}
  .sup-tools .search-box{max-width:none}
  .form-grid{grid-template-columns:1fr}
  .cat-check-list{grid-template-columns:1fr}
  .sup-head .act-btn{margin-inline-start:0;flex:1 1 100%}
  /* orders screen: single column, stacked info cells */
  .orders-grid{grid-template-columns:1fr}
  .ord-info-grid{grid-template-columns:1fr}
  /* wizard: allocation tables collapse to the sub-card details pattern */
  .alloc-table-wrap{display:none}
  .alloc-cards{display:flex}
  .wiz-steps{gap:4px}
  .wiz-step{flex:1 1 auto;padding:6px 8px}
  .wiz-step .lbl{display:none}
  .wiz-step.active .lbl{display:inline}
  /* modals become full-screen sheets (both sizes) */
  .modal-overlay{padding:0;align-items:stretch;justify-content:stretch}
  .modal-card,.modal-card.wide{
    max-width:none;width:100%;height:100%;max-height:none;border-radius:0;
    padding:14px 14px 24px;
  }
  /* remaining tap-target / readability floors on small screens */
  .cell-in{min-height:44px}
  .mini-btn,.s-btn{min-height:44px}
  .ts-name{flex-basis:110px}
}
@media (min-width:769px){
  .ov-grid{grid-template-columns:2fr 1fr;align-items:start}
  .ov-grid .panel.p-cats{grid-column:1}
  .ov-grid .panel.p-donut{grid-column:2}
}
@media (max-width:420px){
  .sup-grid{grid-template-columns:1fr 1fr}
  main{padding:12px 10px 56px}
  .filters{padding:10px 10px 0}
}

/* ---------- Print: dedicated order sheet (#printArea) ----------
   On screen the sheet is never visible; while body.printing-order is
   set, printing shows ONLY the #printArea subtree. */
#printArea{display:none}
.print-sheet{direction:rtl;color:#000;background:#fff;font-size:12pt;line-height:1.5}
.ps-title{font-size:16pt;font-weight:800;margin-bottom:4pt}
.ps-meta{display:flex;flex-wrap:wrap;gap:2pt 18pt;font-size:10pt;margin-bottom:8pt}
.ps-box{border:1pt solid #000;border-radius:4pt;padding:6pt 9pt;margin-bottom:8pt;font-size:10.5pt}
.ps-h2{font-size:11.5pt;font-weight:800;margin:10pt 0 4pt;break-after:avoid}
table.ps{width:100%;border-collapse:collapse;font-size:10pt;margin-bottom:6pt}
table.ps th,table.ps td{border:1pt solid #555;padding:3pt 6pt;text-align:start;vertical-align:middle}
table.ps th{background:#eee;font-weight:800}
table.ps th.num,table.ps td.num{text-align:center;direction:ltr;font-variant-numeric:tabular-nums}
.ps-totals{
  display:flex;flex-wrap:wrap;gap:2pt 18pt;font-weight:800;font-size:11pt;
  border-top:2pt solid #000;padding-top:6pt;margin-top:10pt;
}
.ps-foot{margin-top:10pt;font-size:9pt;color:#333}
@page{size:A4;margin:12mm}
@media print{
  body.printing-order > :not(#printArea){display:none !important}
  body.printing-order #printArea{display:block !important}
  body.printing-order{background:#fff;overflow:visible}
  table.ps thead{display:table-header-group}
  table.ps tr{break-inside:avoid}
  table.ps th{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .print-sheet .rep-neg{color:#b91c1c}
  .print-sheet tr.rep-cat-row td{
    background:#eee !important;color:#000;font-weight:800;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .ps-box,.ps-totals{break-inside:avoid}
}
</style>
</head>

   isEmbedded=true additionally asserts the ground-truth invariants
   (target 1000 / reg 1877 / deficit 374 / excess 202).
   Throws on any conservation failure — callers must fall back.
   ============================================================ */
function migrateV1toV2(v1, isEmbedded) {
  /* 1. prebuilt 21 categories from DEFAULT_CATEGORIES */
  const cats = DEFAULT_CATEGORIES.map(dc => ({
    id: dc.id, name: dc.name,
    info: { status: "", payStatus: "", account: "", invoices: 0, paid: 0 },
    suppliers: [],
    rows: dc.subs.map((sub, idx) => ({
      id: dc.id + "-" + String(idx + 1).padStart(3, "0"),
      code: "", name: sub, target: 0, vals: [], note: ""
    }))
  }));

  /* 2. group v1 contributors per target category (السبالة splits per-row) */
  const contributors = {}; // targetId -> [{rows:[{src,name}], suppliers, info, infoCredited, order}]
  const pushContrib = (tid, cb) => { (contributors[tid] = contributors[tid] || []).push(cb); };
  v1.forEach((c, order) => {
    if (normName(c.name) === SABALA_KEY) {
      const slices = {};
      c.rows.forEach(r => {
        const m = String(r.name).match(SABALA_SUFFIX_RE);
        const tid = m ? SABALA_ROUTE[m[1]] : "002"; // unsuffixed (none in data) -> largest slice
        const nm = m ? String(r.name).replace(SABALA_SUFFIX_RE, "").trim() : String(r.name);
        (slices[tid] = slices[tid] || []).push({ src: r, name: nm });
      });
      /* السبالة's own info credited ONCE — to its largest slice (002) */
      Object.keys(slices).forEach(tid => {
        pushContrib(tid, { rows: slices[tid], suppliers: c.suppliers, info: c.info,
          infoCredited: tid === "002", order });
      });
      if (!slices["002"]) {
        pushContrib("002", { rows: [], suppliers: c.suppliers, info: c.info,
          infoCredited: true, order });
      }
    } else {
      const tid = CAT_MAP[normName(c.name)];
      if (!tid) throw new Error("migrate: unmapped v1 category " + c.name);
      pushContrib(tid, {
        rows: c.rows.map(r => ({ src: r, name: String(r.name) })),
        suppliers: c.suppliers, info: c.info, infoCredited: true, order
      });
    }
  });

  /* 3-6. per-category: column union, row claim/append, info merge */
  let claimed = 0, appended = 0;
  cats.forEach(cat => {
    const list = contributors[cat.id] || [];
    /* primary = most rows; ties -> first in v1 order */
    const sorted = list.slice().sort((a, b) => (b.rows.length - a.rows.length) || (a.order - b.order));
    /* ordered union of REAL supplier names, primary's order first */
    const union = [], seen = new Set();
    sorted.forEach(cb => {
      cb.suppliers.forEach(s => {
        const nm = String(s || "").trim();
        if (nm && !PLACEHOLDER_RE.test(nm) && !seen.has(nm)) { seen.add(nm); union.push(nm); }
      });
    });
    const colCount = Math.max(15, union.length);
    cat.suppliers = union.slice();
    for (let i = union.length; i < colCount; i++) cat.suppliers.push("اسم الشركة " + (i + 1));
    const colIdx = {};
    union.forEach((nm, i) => { colIdx[nm] = i; });
    /* prebuilt sub lookup by normalized name (claim each row at most once) */
    const claimedIdx = new Set();
    const normIdx = {};
    cat.rows.forEach((r, i) => {
      const k = normName(r.name);
      (normIdx[k] = normIdx[k] || []).push(i);
    });
    let xSeq = 0;
    sorted.forEach(cb => {
      /* per-contributor column remap by real name (placeholder/empty cols never remap) */
      const remap = {};
      cb.suppliers.forEach((s, i) => {
        const nm = String(s || "").trim();
        if (nm && !PLACEHOLDER_RE.test(nm) && colIdx[nm] != null) remap[i] = colIdx[nm];
      });
      cb.rows.forEach(entry => {
        const src = entry.src;
        const vals = new Array(colCount).fill(0);
        (src.vals || []).forEach((v, i) => { if (remap[i] != null) vals[remap[i]] = +v || 0; });
        const cand = (normIdx[normName(entry.name)] || []).find(i => !claimedIdx.has(i));
        if (cand != null) {
          claimedIdx.add(cand);
          const row = cat.rows[cand]; /* claim: keep the NEW sub name */
          row.code = String(src.code == null ? "" : src.code);
          row.target = Math.max(0, +src.target || 0);
          row.note = String(src.note == null ? "" : src.note);
          row.vals = vals;
          claimed++;
        } else {
          xSeq++;
          cat.rows.push({
            id: cat.id + "-x" + String(xSeq).padStart(3, "0"),
            code: String(src.code == null ? "" : src.code), name: entry.name,
            target: Math.max(0, +src.target || 0), vals, note: String(src.note == null ? "" : src.note)
          });
          appended++;
        }
      });
      if (cb.infoCredited) {
        cat.info.invoices += (+cb.info.invoices || 0);
        cat.info.paid += (+cb.info.paid || 0);
      }
    });
    /* enums from the primary contributor */
    if (sorted.length) {
      const pi = sorted[0].info || {};
      cat.info.status = String(pi.status || "");
      cat.info.payStatus = String(pi.payStatus || "");
      cat.info.account = String(pi.account || "");
    }
    /* 5. every row's vals padded to the final column count */
    cat.rows.forEach(r => { while (r.vals.length < cat.suppliers.length) r.vals.push(0); });
  });

  /* 7. supplier entities from the 16 unique real names */
  const nowIso = new Date().toISOString();
  const supNames = [], supSeen = new Set();
  v1.forEach(c => c.suppliers.forEach(s => {
    const nm = String(s || "").trim();
    if (nm && !PLACEHOLDER_RE.test(nm) && !supSeen.has(nm)) { supSeen.add(nm); supNames.push(nm); }
  }));
  const suppliers = supNames.map(nm => ({
    id: genId("SUP"), name: nm, contact: "", email: "", address: "",
    status: "active", notes: "",
    assignedCategories: cats.filter(c => c.suppliers.indexOf(nm) !== -1).map(c => c.id),
    createdAt: nowIso, updatedAt: nowIso
  }));

  const v2 = { version: 2, categories: cats, suppliers, orders: [] };

  /* 9. hard self-check — conservation between input and output */
  const inRows = v1.reduce((a, c) => a + c.rows.length, 0);
  if (claimed + appended !== inRows) throw new Error("migrate: row-count conservation failed");
  const inB = branchCalcOf(v1), outB = branchCalcOf(cats);
  if (outB.target !== inB.target || outB.reg !== inB.reg || outB.deficit !== inB.deficit ||
      outB.excess !== inB.excess || outB.invoices !== inB.invoices || outB.paid !== inB.paid) {
    throw new Error("migrate: sum conservation failed");
  }
  if (isEmbedded &&
      !(outB.target === 1000 && outB.reg === 1877 && outB.deficit === 374 && outB.excess === 202)) {
    throw new Error("migrate: embedded-DATA invariants failed");
  }
  if (!validDataV2(v2)) throw new Error("migrate: output failed validDataV2");
  return v2;
}

/* ============================================================
   Persistence — v2 key; the v1 key is read-only migration input
   ============================================================ */
function loadState() {
  savedAtIso = null;
  /* 1) current v2 key */
  try {
    const raw = localStorage.getItem(LS_KEY_V2);
    if (raw) {
      const obj = JSON.parse(raw);
      const data = obj && !Array.isArray(obj) ? (obj.data || obj) : null;
      if (validDataV2(data)) {
        const fixes = sanitizeV2(data);
        state = data;
        savedAtIso = (obj && obj.savedAt) || null;
        if (fixes > 0) toast("تم إصلاح " + fmt(fixes) + " من الإدخالات غير المتسقة");
        return;
      }
    }
  } catch (e) { /* corrupted v2 -> fall through */ }
  /* 2) legacy v1 key -> migrate (v1 key is NEVER deleted or overwritten) */
  try {
    const raw = localStorage.getItem(LS_KEY_V1);
    if (raw) {
      const obj = JSON.parse(raw);
      const data = Array.isArray(obj) ? obj : obj && obj.data;
      if (validDataV1(data)) {
        const v2 = migrateV1toV2(clone(data));
        sanitizeV2(v2);
        state = v2;
        return;
      }
    }
  } catch (e) { toast("تعذّر ترقية البيانات المحفوظة — تم استخدام البيانات الأصلية"); }
  /* 3) embedded DATA fallback */
  state = migrateV1toV2(clone(DATA), true);
}
function persistNow() {
  if (!validDataV2(state)) { toast("خلل في البيانات — لم يتم الحفظ"); return; }
  savedAtIso = new Date().toISOString();
  try {
    localStorage.setItem(LS_KEY_V2, JSON.stringify({ savedAt: savedAtIso, data: state }));
  } catch (e) { toast("تعذّر الحفظ في المتصفح"); }
  renderSavedAt();
}
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistNow, 400);
}
/* v1 (array-of-categories) validator — kept as migration-input gate */
function validDataV1(d) {
  return Array.isArray(d) && d.length > 0 && d.every(c =>
    c && typeof c.name === "string" && Array.isArray(c.suppliers) &&
    Array.isArray(c.rows) && c.info && typeof c.info === "object" &&
    !Array.isArray(c.info) &&
    c.rows.every(r => r && typeof r === "object" && Array.isArray(r.vals)));
}
/* v2 structural validator — NEVER persist state before this passes.
   Status strings are validated structurally; enum coercion is sanitizeV2's job. */
function validDataV2(d) {
  if (!d || typeof d !== "object" || Array.isArray(d) || d.version !== 2) return false;
  if (!Array.isArray(d.categories) || d.categories.length === 0) return false;
  const catIds = new Set();
  for (const c of d.categories) {
    if (!c || typeof c !== "object" || Array.isArray(c)) return false;
    if (typeof c.id !== "string" || !c.id || catIds.has(c.id)) return false;
    catIds.add(c.id);
    if (typeof c.name !== "string") return false;
    if (!c.info || typeof c.info !== "object" || Array.isArray(c.info)) return false;
    if (!Array.isArray(c.suppliers) || !c.suppliers.every(s => typeof s === "string")) return false;
    if (!Array.isArray(c.rows)) return false;
    const rowIds = new Set();
    for (const r of c.rows) {
      if (!r || typeof r !== "object" || Array.isArray(r)) return false;
      if (typeof r.id !== "string" || !r.id || rowIds.has(r.id)) return false;
      rowIds.add(r.id);
      if (typeof r.name !== "string") return false;
      if (!Array.isArray(r.vals)) return false;
    }
  }
  if (!Array.isArray(d.suppliers)) return false;
  const supIds = new Set();
  for (const s of d.suppliers) {
    if (!s || typeof s !== "object" || Array.isArray(s)) return false;
    if (typeof s.id !== "string" || !s.id || supIds.has(s.id)) return false;
    supIds.add(s.id);
    if (typeof s.name !== "string") return false;
    if (!Array.isArray(s.assignedCategories)) return false;
  }
  if (!Array.isArray(d.orders)) return false;
  const ordIds = new Set();
  for (const o of d.orders) {
    if (!o || typeof o !== "object" || Array.isArray(o)) return false;
    if (typeof o.id !== "string" || !o.id || ordIds.has(o.id)) return false;
    ordIds.add(o.id);
    if (typeof o.supplierId !== "string") return false;
    if (typeof o.status !== "string") return false;
    if (!Array.isArray(o.items)) return false;
    for (const it of o.items) {
      if (!it || typeof it !== "object" || Array.isArray(it)) return false;
      if (typeof it.mainCategoryId !== "string") return false;
      if (!it.subAllocations || typeof it.subAllocations !== "object" ||
          Array.isArray(it.subAllocations)) return false;
      for (const key in it.subAllocations) {
        const a = it.subAllocations[key];
        if (!a || typeof a !== "object" || Array.isArray(a)) return false;
        if (!(+a.qty >= 0)) return false;                    // numeric-coercible, >= 0
      }
    }
    if (o.posted != null) {
      if (typeof o.posted !== "object" || Array.isArray(o.posted)) return false;
      if (typeof o.posted.at !== "string" || !Array.isArray(o.posted.cells)) return false;
      for (const cell of o.posted.cells) {
        if (!cell || typeof cell !== "object" || Array.isArray(cell)) return false;
        if (typeof cell.catId !== "string" || typeof cell.rowId !== "string") return false;
        if (!(Number.isInteger(cell.colIdx) && cell.colIdx >= 0)) return false;
        if (!(+cell.qty >= 0)) return false;
      }
    }
  }
  return true;
}
/* deterministic integrity pass — run after every load/import, before render.
   Returns the number of fixes applied (0 = already consistent). */
function sanitizeV2(d) {
  let fixes = 0;
  const catIds = new Set(d.categories.map(c => c.id));
  const rowIds = {};
  d.categories.forEach(c => { rowIds[c.id] = new Set(c.rows.map(r => r.id)); });
  const supIds = new Set(d.suppliers.map(s => s.id));
  d.suppliers.forEach(s => {
    const before = s.assignedCategories.length;
    s.assignedCategories = s.assignedCategories.filter(id => catIds.has(id));
    fixes += before - s.assignedCategories.length;
  });
  const keptOrders = [];
  d.orders.forEach(o => {
    if (!supIds.has(o.supplierId)) { fixes++; return; }        // drop orphan-supplier order
    if (ORDER_STATUSES.indexOf(o.status) === -1) { o.status = "draft"; fixes++; }
    const keptItems = [];
    o.items.forEach(it => {
      if (!catIds.has(it.mainCategoryId)) { fixes++; return; } // drop orphan-category item
      const rows = rowIds[it.mainCategoryId];
      Object.keys(it.subAllocations).forEach(key => {
        if (!rows.has(key)) { delete it.subAllocations[key]; fixes++; return; }
        const a = it.subAllocations[key];
        if (+a.qty < 0) { a.qty = 0; fixes++; }
      });
      if (+it.target < 0) { it.target = 0; fixes++; }
      keptItems.push(it);
    });
    o.items = keptItems;
    if (!o.items.length) { fixes++; return; }                  // drop empty order
    keptOrders.push(o);
  });
  d.orders = keptOrders;
  return fixes;
}
function renderSavedAt() {
  const el = $("#savedAt");
  if (!savedAtIso) { el.textContent = "لم يتم الحفظ بعد"; return; }
  const d = new Date(savedAtIso);
  el.textContent = "آخر حفظ: " + d.toLocaleDateString("ar", { numberingSystem: "latn" }) + " " +
    d.toLocaleTimeString("ar", { numberingSystem: "latn", hour: "2-digit", minute: "2-digit" });
}

/* ============================================================
   Computations — must match the Excel formulas exactly
   ============================================================ */
function rowCalc(r) {
  const target = +r.target || 0;
  const reg = r.vals.reduce((a, b) => a + (+b || 0), 0);
  const deficit = Math.max(target - reg, 0);
  const pct = target === 0 ? 0 : Math.min(reg / target, 1);
  let status = "";
  if (target !== 0) {
    status = pct >= 0.9 ? ST.DONE : pct >= 0.6 ? ST.PROG : pct >= 0.3 ? ST.FOLLOW : ST.NONE;
  }
  const excess = (target > 0 && reg > target) ? reg - target : 0;
  return { target, reg, deficit, pct, status, excess };
}
function statusFromPct(target, reg) {
  if (!target) return "";
  const pct = Math.min(reg / target, 1);
  return pct >= 0.9 ? ST.DONE : pct >= 0.6 ? ST.PROG : pct >= 0.3 ? ST.FOLLOW : ST.NONE;
}
function catCalc(c) {
  let target = 0, reg = 0, deficit = 0, excess = 0;
  const counts = {};
  for (const r of c.rows) {
    const k = rowCalc(r);
    target += k.target; reg += k.reg; deficit += k.deficit; excess += k.excess;
    counts[k.status || ST.NOTGT] = (counts[k.status || ST.NOTGT] || 0) + 1;
  }
  const pct = target === 0 ? 0 : Math.min(reg / target, 1);
  return { target, reg, deficit, excess, pct, status: statusFromPct(target, reg), counts };
}
function branchCalcOf(cats) {
  let target = 0, reg = 0, deficit = 0, excess = 0, invoices = 0, paid = 0;
  const counts = {};
  for (const c of cats) {
    const k = catCalc(c);
    target += k.target; reg += k.reg; deficit += k.deficit; excess += k.excess;
    invoices += (+c.info.invoices || 0); paid += (+c.info.paid || 0);
    for (const key in k.counts) counts[key] = (counts[key] || 0) + k.counts[key];
  }
  const pct = target === 0 ? 0 : Math.min(reg / target, 1);
  return { target, reg, deficit, excess, invoices, paid, pct, counts };
}
function branchCalc() { return branchCalcOf(state.categories); }
function visibleSupplierIdx(c) {
  const out = [];
  c.suppliers.forEach((s, i) => {
    const nm = String(s || "").trim();
    if (nm && !PLACEHOLDER_RE.test(nm)) out.push(i);
  });
  return out;
}
/* Excel rule applied to one order item {target, subAllocations:{rowId:{qty}}}:
   allocated = Σqty; deficit = max(target − allocated, 0) — NEVER negative;
   pct capped at 1; status chips via statusFromPct; over-allocation reported
   as `excess` for the violet «تجاوز المستهدف» badge (only when target > 0,
   same rule as the grid). Derived only — never stored on the order. */
function orderItemCalc(item) {
  const target = Math.max(0, +(item && item.target) || 0);
  let allocated = 0;
  const sa = (item && item.subAllocations) || {};
  for (const k in sa) allocated += Math.max(0, +(sa[k] && sa[k].qty) || 0);
  const deficit = Math.max(target - allocated, 0);
  const pct = target === 0 ? 0 : Math.min(allocated / target, 1);
  const status = statusFromPct(target, allocated);
  const excess = (target > 0 && allocated > target) ? allocated - target : 0;
  return { target, allocated, deficit, pct, status, excess };
}
/* whole-order rollup: deficit is Σ per-item max(target−allocated,0) so an
   over-allocated item can never mask another item's shortage */
function orderCalc(order) {
  let target = 0, allocated = 0, deficit = 0, excess = 0;
  for (const it of ((order && order.items) || [])) {
    const k = orderItemCalc(it);
    target += k.target; allocated += k.allocated; deficit += k.deficit; excess += k.excess;
  }
  const pct = target === 0 ? 0 : Math.min(allocated / target, 1);
  return { target, allocated, deficit, excess, pct, status: statusFromPct(target, allocated) };
}

  }

    '<span class="fill ' + fillClass(k.status) + '" style="width:' + w + '%"></span>' + over +

/* ============================================================
   Filtering
   ============================================================ */
function rowMatches(r, k) {
  if (view.search) {
    const q = view.search.trim();
    if (q && !(String(r.name).includes(q) || String(r.code).includes(q))) return false;
  }
  if (view.filter) {
    if (view.filter === ST.OVER) return k.excess > 0;
    return k.status === view.filter;
  }
  return true;
}
function catMatches(c, k) {
  const anyRow = c.rows.some(r => rowMatches(r, rowCalc(r)));
  if (view.search && !anyRow && !c.name.includes(view.search.trim())) return false;
  if (view.filter) {
    if (view.filter === ST.OVER) return k.excess > 0;
    return k.status === view.filter || c.rows.some(r => rowCalc(r).status === view.filter);
  }
  return true;
}

/* generic donut: segments = [{label, value, color}] drawn in array order;
   geometry uses the segments' own sum, so callers just describe the parts */
function donutSVGgeneric(segments, centerTop, centerSub, ariaLabel) {
  const R = 54, CIRC = 2 * Math.PI * R;
  const total = segments.reduce((a, s) => a + (+s.value || 0), 0);
  let off = 0, segs = "";
  for (const s of segments) {
    const n = +s.value || 0;
    if (!n || !total) continue;
    const len = (n / total) * CIRC;
    segs += '<circle cx="70" cy="70" r="' + R + '" fill="none" stroke="' + s.color +
      '" stroke-width="20" stroke-dasharray="' + len.toFixed(2) + " " + (CIRC - len).toFixed(2) +
      '" stroke-dashoffset="' + (-off).toFixed(2) + '" transform="rotate(-90 70 70)"></circle>';
    off += len;
  }
  if (!segs) segs = '<circle cx="70" cy="70" r="' + R + '" fill="none" stroke="var(--muted-bg)" stroke-width="20"></circle>';
  const legend = segments.map(s =>
    '<div class="li"><span class="sw" style="background:' + s.color + '"></span>' +
    esc(s.label) + ' <b style="direction:ltr">' + fmt(+s.value || 0) + "</b></div>").join("");
  return '<div class="donut-wrap"><svg width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="' + esc(ariaLabel || "") + '">' +
    segs + '<text x="70" y="66" text-anchor="middle" class="donut-center">' + esc(centerTop) + "</text>" +
    '<text x="70" y="82" text-anchor="middle" class="donut-center-sub">' + esc(centerSub) + "</text></svg>" +
    '<div class="donut-legend">' + legend + "</div></div>";
}
/* overview donut: sub-item status distribution (unchanged output) */
function donutSVG(counts, total) {
  const segments = [
    { label: ST.DONE, value: counts[ST.DONE] || 0, color: "var(--done)" },
    { label: ST.PROG, value: counts[ST.PROG] || 0, color: "var(--prog)" },
    { label: ST.FOLLOW, value: counts[ST.FOLLOW] || 0, color: "var(--follow)" },
    { label: ST.NONE, value: counts[ST.NONE] || 0, color: "var(--none)" },
    { label: ST.NOTGT, value: counts[ST.NOTGT] || 0, color: "#94a3b8" }
  ];
  return donutSVGgeneric(segments, fmt(total), "صنف فرعي", "توزيع حالات الأصناف");
}

function bindCategoryEvents(ci) {
  $("#backBtn").addEventListener("click", () => { view.screen = "overview"; view.cat = -1; render(); });

  $$("[data-info]").forEach(el => {
    el.addEventListener("input", () => {
      const key = el.dataset.info;
      state.categories[ci].info[key] = (el.type === "number") ? Math.max(0, +el.value || 0) : el.value;
      scheduleSave();
    });
  });

  $$("[data-cell]").forEach(el => {
    el.addEventListener("input", () => onCellInput(el));
  });

  $("#addRowBtn").addEventListener("click", () => {
    const c = state.categories[ci];
    c.rows.push({ id: genRowId(c.id), code: "", name: "صنف جديد", target: 0,
      vals: new Array(c.suppliers.length).fill(0), note: "" });
    scheduleSave(); render();
    toast("تمت إضافة صنف فرعي جديد");
  });

  $("#addSupBtn").addEventListener("click", () => {
    const c = state.categories[ci];
    const free = c.suppliers.findIndex(s => {
      const nm = String(s || "").trim();
      return !nm || PLACEHOLDER_RE.test(nm);
    });
    if (free === -1) { toast("لا توجد أعمدة موردين متاحة (الحد 15 موردًا)"); return; }
    const name = prompt("اسم المورد الجديد:");
    if (!name || !name.trim()) return;
    c.suppliers[free] = name.trim();
    scheduleSave(); render();
    toast("تمت إضافة المورد «" + name.trim() + "»");
  });
}

function onCellInput(el) {
  const parts = el.dataset.cell.split(":");        // ci : ri : field
  const ci = +parts[0], ri = +parts[1], field = parts[2];
  const c = state.categories[ci];
  const r = c && c.rows[ri];
  if (!r) return;
  if (field === "name") r.name = el.value;
  else if (field === "code") r.code = el.value;
  else if (field === "note") r.note = el.value;
  else if (field === "target") r.target = Math.max(0, +el.value || 0);
  else if (field[0] === "v") r.vals[+field.slice(1)] = Math.max(0, +el.value || 0);

  /* mirror value into the twin input (table <-> card) */
  $$('[data-cell="' + el.dataset.cell + '"]').forEach(twin => {
    if (twin !== el && twin.value !== el.value) twin.value = el.value;
  });
  refreshRowComputed(ci, ri);
  refreshCatComputed(ci);
  scheduleSave();
}

function refreshRowComputed(ci, ri) {
  const r = state.categories[ci].rows[ri], k = rowCalc(r);
  const id = ci + ":" + ri;
  const set = (suffix, html) => {
    $$('[data-rc="' + id + ":" + suffix + '"]').forEach(el => { el.innerHTML = html; });
  };
  set("nm", esc(r.name || "بدون اسم"));
  set("reg", fmt(k.reg));   set("reg2", fmt(k.reg));
  set("def", fmt(k.deficit)); set("def2", fmt(k.deficit));
  set("tgt2", fmt(k.target));
  set("bar", barHTML(k));   set("bar2", barHTML(k));
  set("st", chipHTML(k.status)); set("st2", chipHTML(k.status));
  set("over", overBadgeHTML(k.excess) || "—");
  set("over2", overBadgeHTML(k.excess));
}
function refreshCatComputed(ci) {
  const c = state.categories[ci], k = catCalc(c);
  const totals = $("#catTotals");
  if (totals) totals.outerHTML = catTotalsHTML(k);
  const set = (key, html) => { $$('[data-ct="' + key + '"]').forEach(el => { el.innerHTML = html; }); };
  set("target", fmt(k.target)); set("reg", fmt(k.reg)); set("def", fmt(k.deficit));
  set("bar", barHTML(k)); set("st", chipHTML(k.status));
  set("over", overBadgeHTML(k.excess) || "—");
  visibleSupplierIdx(c).forEach(si => {
    set("s" + si, fmt(c.rows.reduce((a, r) => a + (+r.vals[si] || 0), 0)));
  });
}

function download(blob, filename) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 400);
}
function exportJSON() {
  /* exports the WHOLE v2 state object {version, categories, suppliers, orders} */
  download(new Blob([JSON.stringify(state, null, 2)], { type: "application/json" }),
    "qween-dashboard.json");
  toast("تم تصدير ملف JSON");
}
/* ---- CSV core: UTF-8 BOM + CRLF + RFC quote-escaping ----
   The BOM is what makes Arabic open correctly in Excel — never drop it.
   Line builders below are pure (arrays of cell rows) so tests can assert
   on the exact csvString output without touching Blob/download. */
function csvString(lines) {
  return "\uFEFF" + lines.map(row => row.map(v => {
    v = String(v == null ? "" : v);
    return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v;
  }).join(",")).join("\r\n");
}

  download(new Blob([csvString(lines)], { type: "text/csv;charset=utf-8" }), filename);
  toast("تم تصدير ملف CSV");
}

/* (3) الأوردرات — one line per order×item×sub with qty>0 */
function csvOrdersLines() {
  const lines = [["رقم الأمر", "التاريخ", "المورد", "الحالة", "المجموعة",
    "الصنف الفرعي", "مستهدف المجموعة", "الكمية", "ملاحظة"]];
  for (const o of state.orders) {
    for (const it of (o.items || [])) {
      const cat = state.categories.find(c => c.id === it.mainCategoryId);
      const sa = it.subAllocations || {};
      for (const rowId in sa) {
        const qty = Math.max(0, +(sa[rowId] && sa[rowId].qty) || 0);
        if (qty <= 0) continue;
        const row = cat ? cat.rows.find(r => r.id === rowId) : null;
        lines.push([o.id, fmtDate(o.orderDate), o.supplierName,
          ORDER_STATUS_LABELS[o.status] || o.status,
          cat ? cat.name : it.mainCategoryId, row ? row.name : rowId,
          it.target, qty, (sa[rowId] && sa[rowId].note) || ""]);
      }
    }
  }
  return lines;
}

/* core of the import/restore pipeline — takes the raw file text.
   Accepts: bare v2 object, {savedAt,data:v2}, bare v1 array,
   {savedAt,data:v1Array}. index2-shaped {categories,suppliers,orders}
   without version (and any other bad shape) is cleanly rejected.
   Render-before-persist: a throw anywhere rolls back to the previous
   state and nothing is written. Returns true on success (for tests). */
function applyImportedText(txt) {
  const prev = state;
  try {
    const obj = JSON.parse(txt);
    const unwrapped = (obj && !Array.isArray(obj) && obj.data) ? obj.data : obj;
    let next;
    if (Array.isArray(unwrapped)) {
      if (!validDataV1(unwrapped)) throw new Error("bad v1 shape");
      next = migrateV1toV2(clone(unwrapped));      // throws on conservation failure
    } else if (validDataV2(unwrapped)) {
      next = unwrapped;
    } else {
      throw new Error("bad shape");                // index2-shaped / truncated -> clean rejection
    }
    const fixes = sanitizeV2(next);
    if (!validDataV2(next)) throw new Error("bad sanitized shape");
    state = next;
    render();          // render first: a throw here must not persist bad state
    persistNow();
    toast(fixes > 0
        ? "تم الاستيراد مع إصلاح " + fmt(fixes) + " من الإدخالات غير المتسقة"
        : "تم استيراد البيانات بنجاح");
    return true;
  } catch (e) {
    state = prev;
    render();
    toast("ملف غير صالح — تعذّر الاستيراد");
    return false;
  }
}
function importJSON(file) {
  const rd = new FileReader();
  rd.onload = () => applyImportedText(rd.result);
  rd.readAsText(file, "utf-8");
}
function resetAll() {

/* ============================================================
   Suppliers screen (stage 3) — card grid + filters, supplier
   CRUD modal, category-assignment modal, rename propagation.
   Supplier entities link to grid columns BY NAME; deleting an
   entity removes it and its orders but NEVER touches the grid
   (cat.suppliers columns / row.vals stay intact).
   ============================================================ */
/* transient view state — never persisted */
let supFilters = { search: "", status: "", cat: "" };
let supModalId = null;            // supplier being edited in the CRUD modal (null = add)
let catModalSupplierId = null;    // supplier whose categories are being assigned
let catModalSel = null;           // Set<catId> — survives list filtering (unlike index2)
let catModalFilter = "";

/* unique-name rule: non-empty, not the reserved placeholder pattern
   («اسم الشركة N» names the empty grid columns), unique among suppliers.
   Returns an error message or null when valid. */
function supplierNameError(name, excludeId) {
  const nm = String(name == null ? "" : name).trim();
  if (!nm) return "اسم المورد مطلوب";
  if (PLACEHOLDER_RE.test(nm)) return "هذا الاسم محجوز لأعمدة الموردين الفارغة — اختر اسمًا مختلفًا";
  if (state.suppliers.some(s => s.id !== excludeId && String(s.name).trim() === nm))
    return "يوجد مورد آخر بنفس الاسم";
  return null;
}

/* rename propagation: every matching cat.suppliers column string (all
   categories, exact trimmed match) + supplierName snapshot on the
   supplier's own orders. Returns counts for tests/telemetry. */
function propagateSupplierRename(oldName, newName, supplierId) {
  const from = String(oldName == null ? "" : oldName).trim();
  let cols = 0, ords = 0;
  if (from) {
    state.categories.forEach(c => {
      c.suppliers.forEach((nm, i) => {
        if (String(nm).trim() === from) { c.suppliers[i] = newName; cols++; }
      });
    });
  }
  state.orders.forEach(o => {
    if (o.supplierId === supplierId) { o.supplierName = newName; ords++; }
  });
  return { cols, ords };
}

function filteredSuppliers() {
  const q = supFilters.search.trim().toLowerCase();
  return state.suppliers.filter(s => {
    if (supFilters.status && s.status !== supFilters.status) return false;
    if (supFilters.cat && s.assignedCategories.indexOf(supFilters.cat) === -1) return false;
    if (q) {
      const hay = (s.name + " " + (s.contact || "") + " " + (s.email || "") + " " +
        (s.address || "") + " " + (s.notes || "")).toLowerCase();
      const catNames = s.assignedCategories.map(id => {
        const c = state.categories.find(x => x.id === id);
        return c ? c.name : "";
      }).join(" ").toLowerCase();
      if (hay.indexOf(q) === -1 && catNames.indexOf(q) === -1) return false;
    }
    return true;
  });
}

function saveSupplier() {
  const nameEl = $("#supFName");
  if (!nameEl) return;
  const name = String(nameEl.value || "").trim();
  const err = supplierNameError(name, supModalId);
  if (err) { toast(err); return; }
  const now = new Date().toISOString();
  const data = {
    name,
    contact: String($("#supFContact").value || "").trim(),
    email: String($("#supFEmail").value || "").trim(),
    address: String($("#supFAddress").value || "").trim(),
    status: $("#supFStatus").value === "inactive" ? "inactive" : "active",
    notes: String($("#supFNotes").value || "").trim()
  };
  if (supModalId) {
    const s = state.suppliers.find(x => x.id === supModalId);
    if (!s) { toast("المورد غير موجود"); closeAppModal(); return; }
    const oldName = s.name;
    Object.assign(s, data, { updatedAt: now });
    if (String(oldName).trim() !== name) propagateSupplierRename(oldName, name, s.id);
    toast("تم تحديث بيانات المورد");
  } else {
    state.suppliers.push(Object.assign({ id: genId("SUP"), assignedCategories: [],
      createdAt: now, updatedAt: now }, data));
    toast("تمت إضافة المورد «" + name + "»");
  }
  scheduleSave();
  closeAppModal();
  if (view.screen === "suppliers") renderSuppliers();
}
function deleteSupplier(id) {
  const s = state.suppliers.find(x => x.id === id);
  if (!s) return;
  const n = state.orders.filter(o => o.supplierId === id).length;
  if (!confirm("سيتم حذف المورد «" + s.name + "»" +
    (n ? " مع " + fmt(n) + " من أوردراته" : "") +
    ".\nلن تتأثر أعمدة اللوحة ولا الكميات المسجلة.\nهل أنت متأكد؟")) return;
  /* removes the entity + its orders ONLY — grid columns/vals untouched */
  state.suppliers = state.suppliers.filter(x => x.id !== id);
  state.orders = state.orders.filter(o => o.supplierId !== id);
  scheduleSave();
  closeAppModal();
  if (view.screen === "suppliers") renderSuppliers();
  toast("تم حذف المورد");
}

/* ============================================================
   Order wizard (stage 4) — 4-step modal, create AND edit.
   Wizard scratch state `wiz` is a TRANSIENT global: it lives
   outside `state` and is therefore never validated, sanitized
   or persisted. Allocation rows ARE the category grid rows,
   keyed by stable row.id — one identity space with the grid.
   Posted orders (order.posted != null) are locked from editing
   until un-posted (stage 5 owns the posting engine).
   ============================================================ */
let wiz = null; // {orderId|null, step 1..4, supplierId, selectedCategories:[catId], allocations:{catId:{target, subAllocations:{rowId:{qty,note}}}}}
const WIZ_STEP_LABELS = ["المورد", "المجموعات", "الكميات والمستهدفات", "المراجعة"];

function openOrderWizard(opts) {
  opts = opts || {};
  if (opts.orderId) {
    /* EDIT mode: preload from the order; supplier locked */
    const o = state.orders.find(x => x.id === opts.orderId);
    if (!o) { toast("الأمر غير موجود"); return; }
    if (o.posted) { toast("لا يمكن تعديل أمر تم ترحيل كمياته — أعد حالته من «تم التسليم» أولاً"); return; }
    const alloc = {};
    (o.items || []).forEach(it => {
      alloc[it.mainCategoryId] = {
        target: Math.max(0, +it.target || 0),
        subAllocations: clone(it.subAllocations || {})   /* copy: order untouched until save */
      };
    });
    wiz = { orderId: o.id, step: 1, supplierId: o.supplierId,
      selectedCategories: (o.items || []).map(it => it.mainCategoryId), allocations: alloc };
  } else {
    /* CREATE mode: optional supplier preselect (from the supplier card) */
    const supId = (opts.supplierId && state.suppliers.some(s => s.id === opts.supplierId))
      ? opts.supplierId : null;
    wiz = { orderId: null, step: 1, supplierId: supId, selectedCategories: [], allocations: {} };
  }
  openAppModal(wizHTML(), { wide: true, onClose: () => { wiz = null; } });
  wizBind();
}
/* re-render the open wizard in place (step change / supplier pick) */
function wizRender() {

/* categories offered in step 2: the supplier's assignedCategories, plus
   (edit mode) categories already on the order even if unassigned since —
   existing allocations must never silently disappear */
function wizSupplierCats(s) {
  const assigned = (s && s.assignedCategories) || [];
  const sel = wiz ? wiz.selectedCategories : [];
  return state.categories.filter(c =>
    assigned.indexOf(c.id) !== -1 || sel.indexOf(c.id) !== -1);
}

/* the items that WOULD be saved right now: stable category order, only
   selected categories, only rowIds that still exist in the grid, qty
   clamped ≥ 0, zero-qty empty-note rows dropped */
function wizItems() {
  if (!wiz) return [];
  const items = [];
  state.categories.forEach(c => {
    if (wiz.selectedCategories.indexOf(c.id) === -1) return;
    const a = wiz.allocations[c.id] || { target: 0, subAllocations: {} };
    const rowIds = new Set(c.rows.map(r => r.id));
    const sub = {};
    const src = a.subAllocations || {};
    for (const rid in src) {
      if (!rowIds.has(rid)) continue;
      const e = src[rid] || {};
      const qty = Math.max(0, +e.qty || 0);
      const note = String(e.note == null ? "" : e.note).trim();
      if (qty > 0 || note) sub[rid] = { qty, note };
    }
    items.push({ mainCategoryId: c.id, target: Math.max(0, +a.target || 0), subAllocations: sub });
  });
  return items;
}
