/* ---- per-step event wiring (called after every wizard render) ---- */
function wizBind() {
  if (!wiz) return;
  if (wiz.step === 1 && !wiz.orderId) {
    const inp = $("#wizSupSearch");
    if (inp && inp.addEventListener) {
      let t = null;
      inp.addEventListener("input", () => {
        clearTimeout(t);
        t = setTimeout(() => wizFilterSuppliers(inp.value), 150);
      });
    }
  } else if (wiz.step === 2) {
    const list = $("#wizCatList");
    if (list && list.addEventListener) list.addEventListener("change", (e) => {
      const cb = e.target.closest ? e.target.closest("input[type=checkbox][data-id]") : null;
      if (!cb || !wiz) return;
      const id = cb.dataset.id;
      if (cb.checked) { if (wiz.selectedCategories.indexOf(id) === -1) wiz.selectedCategories.push(id); }
      else wiz.selectedCategories = wiz.selectedCategories.filter(x => x !== id);
      /* allocations of an unchecked category are kept in the scratch state
         (re-checking restores them) — wizItems() saves selected ones only */
      const lab = cb.closest(".cat-check");
      if (lab && lab.classList) lab.classList.toggle("checked", !!cb.checked);
      const cnt = $("#wizCatCount");
      if (cnt) cnt.textContent = "محدد: " + fmt(wiz.selectedCategories.length);
    });
  } else if (wiz.step === 3) {
    const box = $("#wizAlloc");
    if (box && box.addEventListener) box.addEventListener("input", (e) => {
      const t = e.target;
      if (!wiz || !t || !t.dataset) return;
      if (t.dataset.wizTarget) {
        const a = wizAllocEnsure(t.dataset.wizTarget);
        a.target = Math.max(0, +t.value || 0);
        wizRefreshSum(t.dataset.wizTarget);
      } else if (t.dataset.wizQty) {
        const key = t.dataset.wizQty, i = key.indexOf(":");
        const catId = key.slice(0, i), rowId = key.slice(i + 1);
        const a = wizAllocEnsure(catId);
        if (!a.subAllocations[rowId]) a.subAllocations[rowId] = { qty: 0, note: "" };
        a.subAllocations[rowId].qty = Math.max(0, +t.value || 0);
        wizMirror("wizQty", key, t);
        $$("[data-wiz-sumq]").forEach(el => {
          if (el.dataset.wizSumq === key) el.textContent = fmt(a.subAllocations[rowId].qty);
        });
        wizRefreshSum(catId);
      } else if (t.dataset.wizNote) {
        const key = t.dataset.wizNote, i = key.indexOf(":");
        const catId = key.slice(0, i), rowId = key.slice(i + 1);
        const a = wizAllocEnsure(catId);
        if (!a.subAllocations[rowId]) a.subAllocations[rowId] = { qty: 0, note: "" };
        a.subAllocations[rowId].note = t.value;
        wizMirror("wizNote", key, t);
      }
    });
  }
}
function wizAllocEnsure(catId) {
  if (!wiz.allocations[catId]) wiz.allocations[catId] = { target: 0, subAllocations: {} };
  if (!wiz.allocations[catId].subAllocations) wiz.allocations[catId].subAllocations = {};
  return wiz.allocations[catId];
}
/* mirror a value into the twin input (desktop table <-> mobile card);
   twins are matched by dataset comparison, never by interpolated selector */
function wizMirror(dataKey, key, src) {
  $$("[data-" + (dataKey === "wizQty" ? "wiz-qty" : "wiz-note") + "]").forEach(el => {
    if (el !== src && el.dataset[dataKey] === key && el.value !== src.value) el.value = src.value;
  });
}
function wizRefreshSum(catId) {
  const a = (wiz && wiz.allocations[catId]) || { target: 0, subAllocations: {} };
  const k = orderItemCalc({ target: a.target, subAllocations: a.subAllocations });
  $$("[data-wiz-sum]").forEach(el => {
    if (el.dataset.wizSum === catId) el.innerHTML = wizSumHTML(k);
  });
}
function wizFilterSuppliers(qRaw) {
  const list = $("#wizSupList");
  if (!list || !wiz) return;
  const q = String(qRaw == null ? "" : qRaw).trim().toLowerCase();
  if (!q) { list.hidden = true; list.innerHTML = ""; return; }
  /* ACTIVE suppliers only */
  const matches = state.suppliers.filter(s => s.status === "active" &&
    (String(s.name).toLowerCase().indexOf(q) !== -1 ||
     String(s.contact || "").toLowerCase().indexOf(q) !== -1)).slice(0, 8);
  list.innerHTML = matches.length ? matches.map(s =>
    '<button type="button" class="wiz-ac-item" data-action="wiz-pick-sup" data-id="' + esc(s.id) + '">' +
    '<span class="nm">' + esc(s.name) + '</span><span class="sub">' + esc(s.contact || "بدون رقم") + " • " +
    fmt((s.assignedCategories || []).length) + " مجموعة</span></button>").join("")
    : '<div class="wiz-ac-empty">لا نتائج بين الموردين النشطين</div>';
  list.hidden = false;
}

/* ---- step navigation (null-guards at every step) ---- */
function wizNext() {
  if (!wiz) return;
  if (wiz.step === 1) {
    const s = state.suppliers.find(x => x.id === wiz.supplierId);
    if (!s) { toast("اختر المورد أولاً"); return; }
    if (!wiz.orderId && s.status !== "active") { toast("هذا المورد غير نشط — فعّله أولاً من تبويب الموردين"); return; }
    if (!wizSupplierCats(s).length) { toast("هذا المورد ليس لديه مجموعات مخصصة — عيّن المجموعات أولاً"); return; }
  } else if (wiz.step === 2) {
    const s = state.suppliers.find(x => x.id === wiz.supplierId);
    if (!s) { toast("المورد غير موجود — ربما تم حذفه"); return; }
    /* keep only categories that still exist AND are offered for this supplier */
    const offered = new Set(wizSupplierCats(s).map(c => c.id));
    wiz.selectedCategories = wiz.selectedCategories.filter(id => offered.has(id));
    if (!wiz.selectedCategories.length) { toast("اختر مجموعة واحدة على الأقل"); return; }
  }
  /* step 3 values are already collected live by the input handlers */
  wiz.step = Math.min(4, wiz.step + 1);
  wizRender();
}
function wizPrev() {
  if (!wiz) return;
  wiz.step = Math.max(1, wiz.step - 1);
  wizRender();
}

/* ---- save: create ORD order or update in place ---- */
function wizSave() {
  if (!wiz) return;
  const s = state.suppliers.find(x => x.id === wiz.supplierId);
  if (!s) { toast("المورد غير موجود — ربما تم حذفه"); return; }
  const items = wizItems();
  const allZero = !items.length || items.every(it => {
    const k = orderItemCalc(it);
    return k.target === 0 && k.allocated === 0;
  });
  if (allZero) { toast("لا يمكن حفظ أمر فارغ — أدخل مستهدفًا أو كمية واحدة على الأقل"); return; }
  const now = new Date().toISOString();
  const oc = orderCalc({ items });
  const overNote = oc.excess > 0 ? " — تنبيه: يوجد تجاوز للمستهدف +" + fmt(oc.excess) : "";
  if (wiz.orderId) {
    const o = state.orders.find(x => x.id === wiz.orderId);
    if (!o) { toast("الأمر غير موجود — ربما تم حذفه"); closeAppModal(); wiz = null; return; }
    if (o.posted) { toast("لا يمكن تعديل أمر تم ترحيل كمياته — أعد حالته من «تم التسليم» أولاً"); return; }
    o.items = items;
    o.supplierName = s.name;   /* re-sync the denormalized snapshot */
    o.updatedAt = now;
    toast("تم تحديث الأمر" + overNote);
  } else {
    state.orders.push({ id: genId("ORD"), supplierId: s.id, supplierName: s.name,
      orderDate: now, updatedAt: now, status: "draft", notes: "", items, posted: null });
    toast("تم حفظ الأمر بنجاح" + overNote);
  }
  scheduleSave();
  closeAppModal();
  wiz = null;   /* belt and braces: scratch state must never outlive the wizard */
  render();
}

/* ============================================================
   Orders screen (stage 5) — filterable order cards, details
   modal (inline status, notes, delete, edit, print) and the
   POSTING ENGINE. The grid (row.vals) stays the single source
   of registered quantities: an order's allocations enter the
   grid ONLY on «تم التسليم», with every mutation recorded in
   order.posted.cells so leaving the delivered state reverses
   EXACTLY from the ledger (clamped at 0). Double-posting is
   impossible: an existing ledger short-circuits postOrder.
   ============================================================ */
/* transient view state — never persisted */
let ordFilters = { search: "", status: "", supplier: "" };
let ordModalId = null;      // order currently shown in the details modal

const ORDER_STATUS_LABELS = {
  draft: "مسودة", pending: "قيد الانتظار", confirmed: "مؤكد",
  delivered: "تم التسليم", cancelled: "ملغي"
};
/* chips reuse the existing status-pill classes (Qween palette) */
const ORDER_STATUS_CHIP = {
  draft: "s-blank", pending: "s-follow", confirmed: "s-prog",
  delivered: "s-done", cancelled: "s-none"
};
function ordChipHTML(status) {
  return '<span class="st ' + (ORDER_STATUS_CHIP[status] || "s-blank") + '">' +
    esc(ORDER_STATUS_LABELS[status] || status || "—") + "</span>";
}
/* day-first Arabic date with western digits (CLAUDE.md digits rule) */
function fmtDate(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "—";
  return d.toLocaleDateString("ar", { numberingSystem: "latn", year: "numeric", month: "2-digit", day: "2-digit" });
}

/* ---- posting engine ---- */
/* resolve (or create) the grid column for a supplier name in a category:
   exact trimmed name match -> existing column; else the first placeholder
   slot («اسم الشركة N» or empty) is claimed; else a NEW column is appended
   (the 15-column cap is relaxed in v2), extending cat.suppliers AND every
   row.vals so the grid stays rectangular. */
function ensureSupplierColumn(cat, name) {
  const nm = String(name == null ? "" : name).trim();
  for (let i = 0; i < cat.suppliers.length; i++) {
    if (String(cat.suppliers[i] == null ? "" : cat.suppliers[i]).trim() === nm) return i;
  }
  const free = cat.suppliers.findIndex(s => {
    const t = String(s == null ? "" : s).trim();
    return !t || PLACEHOLDER_RE.test(t);
  });
  if (free !== -1) { cat.suppliers[free] = nm; return free; }
  cat.suppliers.push(nm);
  cat.rows.forEach(r => { while (r.vals.length < cat.suppliers.length) r.vals.push(0); });
  return cat.suppliers.length - 1;
}

/* post the order's allocations into the grid; returns true when posted.
   The supplier column is resolved lazily per category so items whose
   quantities are all zero never claim a placeholder column. */
function postOrder(o) {
  if (!o || o.posted) return false;                  // double-posting impossible
  const cells = [];
  let skipped = 0;
  (o.items || []).forEach(it => {
    const sa = (it && it.subAllocations) || {};
    const cat = state.categories.find(c => c.id === it.mainCategoryId);
    if (!cat) {
      for (const rid in sa) { if (Math.max(0, +(sa[rid] && sa[rid].qty) || 0) > 0) skipped++; }
      return;
    }
    let colIdx = -1;
    for (const rid in sa) {
      const qty = Math.max(0, +(sa[rid] && sa[rid].qty) || 0);
      if (!qty) continue;
      const row = cat.rows.find(r => r.id === rid);
      if (!row) { skipped++; continue; }
      if (colIdx === -1) colIdx = ensureSupplierColumn(cat, o.supplierName);
      while (row.vals.length <= colIdx) row.vals.push(0);
      row.vals[colIdx] = (+row.vals[colIdx] || 0) + qty;
      cells.push({ catId: cat.id, rowId: rid, colIdx: colIdx, qty: qty });
    }
  });
  o.posted = { at: new Date().toISOString(), cells: cells };
  if (skipped) toast("تنبيه: تم تجاوز " + fmt(skipped) + " من البنود غير الموجودة في اللوحة أثناء الترحيل");
  return true;
}

/* reverse EXACTLY from the ledger. Values clamp at 0 — a manual decrease
   after posting can leave less than the posted qty (documented in the
   confirm text). Rows/categories deleted meanwhile are skipped + toast. */
function unpostOrder(o) {
  if (!o || !o.posted) return false;
  let skipped = 0;
  (o.posted.cells || []).forEach(cell => {
    const cat = state.categories.find(c => c.id === cell.catId);
    const row = cat && cat.rows.find(r => r.id === cell.rowId);
    const ci = +cell.colIdx;
    if (!row || !(ci >= 0) || ci >= row.vals.length) { skipped++; return; }
    row.vals[ci] = Math.max(0, (+row.vals[ci] || 0) - Math.max(0, +cell.qty || 0));
  });
  o.posted = null;
  if (skipped) toast("تنبيه: " + fmt(skipped) + " من البنود حُذفت من اللوحة قبل السحب — تم تجاوزها");
  return true;
}

/* the single auditable transition — posting/unposting happens ONLY here */
function setOrderStatus(id, status) {
  const o = state.orders.find(x => x.id === id);
  if (!o) { toast("الأمر غير موجود"); return; }
  if (!(status in ORDER_STATUS_LABELS)) return;      // unknown status: ignore
  if (status === o.status) return;
  if (status === "delivered" && !o.posted) {
    if (!confirm("سيتم ترحيل كميات هذا الأمر إلى لوحة المتابعة في عمود المورد «" +
        o.supplierName + "». متابعة؟")) {
      refreshAfterOrderChange(id);                   // snap the select back
      return;
    }
    postOrder(o);
  } else if (o.status === "delivered" && o.posted) {
    if (!confirm("سيتم سحب الكميات المرحّلة من اللوحة. القيم التي خُفّضت يدويًا بعد الترحيل " +
        "تتوقف عند الصفر ولا تصبح سالبة. متابعة؟")) {
      refreshAfterOrderChange(id);
      return;
    }
    unpostOrder(o);
  }
  o.status = status;
  o.updatedAt = new Date().toISOString();
  scheduleSave();
  refreshAfterOrderChange(id);
  toast("تم تحديث حالة الأمر إلى «" + ORDER_STATUS_LABELS[status] + "»");
}

   re-rendered in place, then the current screen (orders list, overview
   panels, category grid — all can be affected by posting) re-renders */

function deleteOrder(id) {
  const o = state.orders.find(x => x.id === id);

  const msg = o.posted

}

/* ============================================================
   Tracking + Reports + overview orders panel (stage 6)
   ============================================================ */
/* ---- shared aggregation over NON-CANCELLED orders (Excel rule) ----
   Items are aggregated per category FIRST; each category row then gets
   deficit = max(target − allocated, 0) and the rollup sums those maxima,
   so an over-allocated category can NEVER mask another one's shortage
   (over-allocation is reported separately as violet `excess`). */
function aggFinish(e) {
  e.deficit = Math.max(e.target - e.allocated, 0);
  e.excess = (e.target > 0 && e.allocated > e.target) ? e.allocated - e.target : 0;
  e.pct = e.target === 0 ? 0 : Math.min(e.allocated / e.target, 1);
  e.status = statusFromPct(e.target, e.allocated);
  return e;
}
function catAggOfOrders(orders) {
  const by = {}, seq = [];
  (orders || []).forEach(o => {
    if (!o || o.status === "cancelled") return;
    (o.items || []).forEach(it => {
      const id = it && it.mainCategoryId;
      if (id == null) return;
      if (!by[id]) { by[id] = { catId: id, target: 0, allocated: 0, ordersCount: 0 }; seq.push(id); }
      by[id].target += Math.max(0, +(it.target) || 0);
      by[id].allocated += orderItemCalc(it).allocated;
      by[id].ordersCount++;
    });
  });
  /* stable order: dashboard category order first, unknown ids last */
  const pos = {};
  state.categories.forEach((c, i) => { pos[c.id] = i; });
  seq.sort((a, b) => (pos[a] == null ? 1e9 : pos[a]) - (pos[b] == null ? 1e9 : pos[b]));
  return seq.map(id => aggFinish(by[id]));
}
function aggRollup(cats) {
  const t = { target: 0, allocated: 0, deficit: 0, excess: 0 };
  cats.forEach(c => {
    t.target += c.target; t.allocated += c.allocated;
    t.deficit += c.deficit; t.excess += c.excess;          /* Σmax — never netted */
  });
  t.pct = t.target === 0 ? 0 : Math.min(t.allocated / t.target, 1);
  t.status = statusFromPct(t.target, t.allocated);
  return t;
}
function supplierTrackAgg(supplierId) {
  const orders = state.orders.filter(o => o.supplierId === supplierId && o.status !== "cancelled");
  const cats = catAggOfOrders(orders);
  const k = aggRollup(cats);
  k.orders = orders.length;
  k.cats = cats;
  return k;
}
function catNameById(id) {
  const c = state.categories.find(x => x.id === id);
  return c ? c.name : String(id);
}

/* the deficit report reads the GRID (rowCalc), not the orders: every row
   with deficit > 0, grouped by category, worst first inside each group */
function gridDeficitGroups() {
  const groups = [];
  state.categories.forEach(c => {
    const rows = [];
    c.rows.forEach(r => {
      const k = rowCalc(r);
      if (k.deficit > 0) rows.push({ name: r.name, target: k.target, reg: k.reg, deficit: k.deficit });
    });
    if (!rows.length) return;
    rows.sort((a, b) => b.deficit - a.deficit);
    groups.push({ name: c.name, rows: rows, deficit: rows.reduce((a, r) => a + r.deficit, 0) });
  });
  return groups;
}
function repDeficitBody(groups) {
  if (!groups.length) {
    return '<tr><td colspan="4" style="text-align:center;color:var(--done);font-weight:700">' +

    '<tr class="rep-cat-row"><td colspan="3">' + esc(gr.name) + " — " + fmt(gr.rows.length) + " صنف</td>" +
    '<td class="num">' + fmt(gr.deficit) + "</td></tr>" +

      '<td class="num">' + fmt(r.reg) + "</td>" +

  ).join("");
}

/* UTF-8 byte count without TextEncoder (works under the test stubs) */
function utf8Bytes(s) {
  let b = 0;
  for (let i = 0; i < s.length; i++) {
    const c = s.charCodeAt(i);
    if (c < 0x80) b += 1;
    else if (c < 0x800) b += 2;
    else if (c >= 0xd800 && c <= 0xdbff) { b += 4; i++; }   /* surrogate pair */
    else b += 3;
  }
  return b;
}
function fmtBytes(b) {
  if (b < 1024) return fmt(b) + " بايت";
  if (b < 1024 * 1024) return fmt(Math.round(b / 1024)) + " كيلوبايت";
  return (Math.round((b / (1024 * 1024)) * 10) / 10).toLocaleString("en-US") + " ميجابايت";
}
/* approx size of the persisted envelope (falls back to in-memory state) */
function storageBytesApprox() {
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY_V2); } catch (e) { /* storage unavailable */ }
  if (typeof raw !== "string") raw = JSON.stringify({ savedAt: savedAtIso, data: state });
  return utf8Bytes(raw);
}

/* ---- sample data: APPEND-ONLY (fixes index2's B4, which shuffled
   state.categories via sort()). Deterministic fixtures, fresh ids on
   every load, names uniquified against existing suppliers so the
   unique-name invariant is never violated. state.categories is only
   READ (row ids for allocations) — never reordered, never written. */
const SAMPLE_SUPPLIERS = [
  { name: "مصنع الجودة", contact: "0501234567", email: "info@quality.sa", address: "الرياض", cats: ["003", "019", "014"] },
  { name: "أهل السراء", contact: "0502345678", email: "info@alsarra.sa", address: "جدة", cats: ["001", "002", "009"] },
  { name: "فضائيات", contact: "0503456789", email: "info@fadaiyat.sa", address: "الدمام", cats: ["005", "010", "016"] },
  { name: "الهدف الساطع", contact: "0504567890", email: "info@alhadaf.sa", address: "مكة", cats: ["004", "013", "006"] },
  { name: "بيست كلين", contact: "0505678901", email: "info@bestclean.sa", address: "المدينة", cats: ["003", "020", "015"] }
];
function loadSampleData() {
  if (state.suppliers.length > 0 &&
      !confirm("سيتم إضافة بيانات تجريبية (موردون وأوردرات) دون المساس بلوحة المجموعات. هل تريد المتابعة؟")) return;
  const now = new Date().toISOString();
  const taken = new Set(state.suppliers.map(s => String(s.name).trim()));
  const statuses = ["draft", "pending", "confirmed"];
  const qtys = [30, 25, 20];
  SAMPLE_SUPPLIERS.forEach((tpl, i) => {
    let name = tpl.name;
    for (let n = 2; taken.has(name); n++) {
      name = tpl.name + " (تجريبي" + (n > 2 ? " " + (n - 1) : "") + ")";
    }
    taken.add(name);
    /* only categories that actually exist (imported states may differ) */
    const assigned = tpl.cats.filter(id => state.categories.some(c => c.id === id));
    const sup = { id: genId("SUP"), name, contact: tpl.contact, email: tpl.email,
      address: tpl.address, status: "active", notes: "بيانات تجريبية",
      assignedCategories: assigned, createdAt: now, updatedAt: now };
    state.suppliers.push(sup);
    const items = assigned.slice(0, 2).map((catId, j) => {
      const cat = state.categories.find(c => c.id === catId);
      const sa = {};
      cat.rows.slice(0, 3).forEach((r, k) => { sa[r.id] = { qty: qtys[k] || 10, note: "" }; });
      return { mainCategoryId: catId, target: 100 + 20 * j, subAllocations: sa };
    }).filter(it => Object.keys(it.subAllocations).length > 0);
    if (items.length) {
      state.orders.push({ id: genId("ORD"), supplierId: sup.id, supplierName: name,
        orderDate: now, updatedAt: now, status: statuses[i % statuses.length],
        notes: "أمر تجريبي", items, posted: null });
    }
  });
  scheduleSave(); render();
  toast("تم تحميل البيانات التجريبية");
}

  if (tab) {
    const v = tab.dataset.tab;
    /* named-screen check FIRST … */
    if (NAMED_SCREENS.has(v)) { view.screen = v; view.cat = -1; }
    /* … numeric category fallthrough must remain LAST */
    else { view.screen = "cat"; view.cat = +v; }
    render();
    return;
  }
  const chip = e.target.closest("[data-filter]");
  if (chip) { view.filter = chip.dataset.filter; render(); }
});
/* modal close paths: backdrop click + Esc (data-action="modal-close" is routed above) */
$("#appModal").addEventListener("click", (e) => {
  if (e.target === e.currentTarget) closeAppModal();
});
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeAppModal();
});
let searchTimer = null;
$("#searchIn").addEventListener("input", (e) => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { view.search = e.target.value; render(); }, 250);
});
$("#btnExportJson").addEventListener("click", exportJSON);
$("#btnExportCsv").addEventListener("click", exportCSV);
$("#btnReset").addEventListener("click", resetAll);
$("#btnImportJson").addEventListener("click", () => $("#importFile").click());
$("#importFile").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (f) importJSON(f);
  e.target.value = "";
});

/* keep the tabbar stuck right under the header regardless of header wrap height */
function syncHeaderHeight() {
  document.documentElement.style.setProperty("--hdr-h", $("#appHeader").offsetHeight + "px");
}
if (window.ResizeObserver) new ResizeObserver(syncHeaderHeight).observe($("#appHeader"));
else window.addEventListener("resize", syncHeaderHeight);

/* ---- boot ---- */
loadState();
renderSavedAt();
render();
syncHeaderHeight();
</script>
</body>
</html>
